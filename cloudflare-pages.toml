# ══════════════════════════════════════════════════════════════
# Cloudflare Pages — Build Configuration
#
# In Cloudflare Pages dashboard set:
#   Build command:         hugo --minify
#   Build output dir:      public
#   Environment variable:  HUGO_VERSION = 0.136.0
# ══════════════════════════════════════════════════════════════

[build]
  command = "hugo --minify"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.136.0"
  HUGO_ENV     = "production"

[[redirects]]
  from   = "/sv"
  to     = "/sv/"
  status = 301

[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
